<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Jeu Mobile</title>
  <link rel="stylesheet" href="style2.css">
  <style>
    /* Le CSS magique qui cache les écrans inactifs */
    #login-screen, #waiting-room-screen, #controller-screen { display: none; }
    .active { display: block !important; }
  </style>
</head>
<body>

  <div id="login-screen" class="active">
    <h1>Rejoindre la partie</h1>
    </div>

  <div id="waiting-room-screen">
    <main>
      <h1>La partie va commencer !</h1>
      <h3 id="loading">Chargement 0oo</h3>
      </main>
  </div>

  <div id="controller-screen">
    </div>

  <script src="ws_config.js"></script>
  <script src="controller.js"></script>
  <script>

    var interval2 = window.setInterval(change_tips, 5500);
    var intervalID = window.setInterval(loading, 500);
    const load = document.getElementById("loading");
    
    function loading() {
      if (load.innerText === "Chargement 0oo") load.innerText = "Chargement o0o";
      else if (load.innerText === "Chargement o0o") load.innerText = "Chargement oo0";
      else load.innerText = "Chargement 0oo";
    }

    function change_tips() {
      let list_tips = [
        "Utilisez les bonus à bon escient",
        "La clé de la victoire est une bonne cohésion d'équipe",
        "M. Ferey mettez-nous 20, svp", 
        "En sah, le jeu il est trop bien ~ C.Keller",
        "Coordonnez-vous entre infectés, c'est important"
      ];
      let tips_txt = document.getElementById("tips");
      if(tips_txt) tips_txt.innerText = "Tips: " + list_tips[Math.floor(Math.random() * list_tips.length)];
    }
  </script>
</body>
</html>
